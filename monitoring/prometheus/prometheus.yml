global:
  scrape_interval: 15s       # Every 15 seconds, collect metrics
  evaluation_interval: 15s   # Evaluate alerting rules every 15s

scrape_configs:
  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter: system-level metrics (CPU, RAM, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # DumbBudget app metrics (if you add /metrics endpoint later)
  - job_name: 'dumbbudget'
    static_configs:
      - targets: ['dumbbudget:3000']
    metrics_path: '/metrics'
    # Will 404 until you add prom-client — Prometheus will just skip it gracefully
