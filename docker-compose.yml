services:
  dumbbudget:
    build: .
    container_name: dumbbudget
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - dumbbudget_data:/app/data
    environment:
      - DUMBBUDGET_PIN=${DUMBBUDGET_PIN:-12345}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - CURRENCY=${CURRENCY:-USD}
      - SITE_TITLE=${SITE_TITLE:-DumbBudget}
      - NODE_ENV=production
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows access to host services like Node Exporter
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring

volumes:
  dumbbudget_data:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
